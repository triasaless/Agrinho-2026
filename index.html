<!DOCTYPE html>
<html>
<head>
    <title>BioAgro - Do Milho ao Plástico</title>
    <style>
        /* Mantive sua estrutura base e melhorei o visual */
        .bloco1 {
            background-color: #27ae60; /* Verde um pouco mais escuro, bem agro */
            padding: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: white;
            min-height: 100vh; /* Ocupa a tela toda */
        }

        .caixa-meio {
            background-color: white; /* Fundo branco para destacar o conteúdo */
            border: 2px solid #27ae60;
            border-radius: 8px; /* Bordas arredondadas dão um toque moderno */
            margin: 20px auto;
            max-width: 500px; /* Não deixa a caixa espalhar demais */
            padding: 25px;
            color: #333;
        }

        /* Estilo do campo de digitação */
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        #btn1 {
            background: #f1c40f;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        #btn1:hover {
            background: #f39c12; /* Escurece de leve ao passar o mouse */
        }

        #resultado {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
            font-size: 18px;
        }

        .texto1 {
            font-size: 12px;
            margin-top: 50px;
            border-top: 1px solid #fff;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    
    <div class="bloco1">
        <div style="font-size: 28px; font-weight: bold;">Tecnologia Agro: Milho em Bioplástico</div>
        
        <div class="caixa-meio">
            <p>Descubra quanto bioplástico pode ser gerado com a sua colheita!</p>
            
            <input type="number" id="qtdMilho" placeholder="Quantas toneladas de milho?">
            
            <div id="btn1" onclick="calcularPlastic()">CALCULAR IMPACTO</div>

            <div id="resultado"></div>
        </div>

        <div class="texto1">Criado por mim e hospedado no GitHub</div>
    </div>

    <script>
        function calcularPlastic() {
            // Pega o valor digitado pelo usuário
            let milho = document.getElementById("qtdMilho").value;
            
            if (milho === "" || milho <= 0) {
                document.getElementById("resultado").innerText = "Por favor, digite um valor válido! 🌽";
                return;
            }

            // Regra de três fictícia/estimada (ex: 1 tonelada de milho gera ~200kg de bioplástico PLA)
            let bioplastico = milho * 200;

            // Mostra o resultado na tela trocando o texto da div
            document.getElementById("resultado").innerHTML = `Com ${milho} toneladas de milho, você pode produzir cerca de <strong>${bioplastico} kg</strong> de bioplástico biodegradável! 🌍`;
        }
    </script>
</body>
</html>
